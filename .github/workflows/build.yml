name: 构建与发布

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Windows x64 可验证构建
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 检出源码
        uses: actions/checkout@v7

      - name: 安装 .NET 10 SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            HardwareScope.csproj
            Tests/ExportSmoke/ExportSmoke.csproj

      - name: 读取并核对版本
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content -Raw -Encoding UTF8 "HardwareScope.csproj"
          $version = [string]$project.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "HardwareScope.csproj 中没有版本号。"
          }
          if ($env:GITHUB_REF -like "refs/tags/*" -and $env:GITHUB_REF_NAME -ne "v$version") {
            throw "标签 $env:GITHUB_REF_NAME 与项目版本 v$version 不一致。"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: 恢复依赖
        run: |
          dotnet restore .\HardwareScope.csproj -r win-x64
          dotnet restore .\Tests\ExportSmoke\ExportSmoke.csproj -r win-x64

      - name: 编译
        run: dotnet build .\HardwareScope.csproj -c Release -r win-x64 --self-contained true --no-restore

      - name: 导出功能冒烟测试
        run: dotnet run --project .\Tests\ExportSmoke\ExportSmoke.csproj -c Release -r win-x64 --no-restore

      - name: 生成自包含发布目录
        run: dotnet publish .\HardwareScope.csproj -c Release -r win-x64 --self-contained true --no-restore -o .\artifacts\publish

      - name: 安装经过哈希验证的 Inno Setup 7.0.2
        shell: pwsh
        run: |
          $url = "https://github.com/jrsoftware/issrc/releases/download/is-7_0_2/innosetup-7.0.2-x64.exe"
          $expectedHash = "5ad54ca3def786f8f4212552e54cc6d8d61329e2d24a1cfee0571d42c2684ff1"
          $installer = Join-Path $env:RUNNER_TEMP "innosetup-7.0.2-x64.exe"
          $installDirectory = Join-Path $env:RUNNER_TEMP "InnoSetup"
          Invoke-WebRequest -Uri $url -OutFile $installer
          $actualHash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Inno Setup SHA-256 校验失败：$actualHash"
          }
          $process = Start-Process -FilePath $installer -ArgumentList @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/SP-",
            "/DIR=$installDirectory"
          ) -Wait -PassThru
          if ($process.ExitCode -notin @(0, 3010)) {
            throw "Inno Setup 安装失败，退出代码：$($process.ExitCode)"
          }
          $iscc = Join-Path $installDirectory "ISCC.exe"
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw "找不到 Inno Setup 编译器：$iscc"
          }
          "INNO_ISCC=$iscc" >> $env:GITHUB_ENV

      - name: 生成 ZIP 和安装程序
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $publishDirectory = (Resolve-Path ".\artifacts\publish").Path
          $installerDirectory = Join-Path $PWD "artifacts\installer"
          New-Item -ItemType Directory -Path $installerDirectory -Force | Out-Null

          $zipPath = Join-Path $PWD "artifacts\HardwareScope-v${version}-win-x64.zip"
          Compress-Archive -Path ".\artifacts\publish\*" -DestinationPath $zipPath -CompressionLevel Optimal

          & $env:INNO_ISCC `
            "/DMyAppVersion=$version" `
            "/DPublishDir=$publishDirectory" `
            "/DInstallerOutputDir=$installerDirectory" `
            "/DInstallerBaseFilename=HardwareScope-Setup-v$version" `
            ".\Installer\HardwareScope.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "安装程序编译失败，退出代码：$LASTEXITCODE"
          }

          $assets = @(
            $zipPath,
            (Join-Path $installerDirectory "HardwareScope-Setup-v${version}.exe")
          )
          $hashLines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash *$([IO.Path]::GetFileName($asset))"
          }
          [IO.File]::WriteAllLines(
            (Join-Path $PWD "artifacts\SHA256SUMS.txt"),
            $hashLines,
            [Text.ASCIIEncoding]::new()
          )

      - name: 保存未签名构建产物
        id: upload_unsigned
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-release-${{ steps.version.outputs.version }}
          if-no-files-found: error
          retention-days: 14
          path: |
            artifacts/HardwareScope-v*-win-x64.zip
            artifacts/installer/HardwareScope-Setup-v*.exe
            artifacts/SHA256SUMS.txt

      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:GITHUB_REF_NAME" `
            ".\artifacts\HardwareScope-v${{ steps.version.outputs.version }}-win-x64.zip" `
            ".\artifacts\installer\HardwareScope-Setup-v${{ steps.version.outputs.version }}.exe" `
            ".\artifacts\SHA256SUMS.txt" `
            --verify-tag `
            --title "别离检测工具 ${{ steps.version.outputs.version }}" `
            --generate-notes
